<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{TITLE}}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
        <style>
            /* ================================================================
       ONEPAGE TERMINAL THEME — Dark/Light, Chart-Ready, Print-Friendly
       ================================================================ */

            :root {
                --bg-base: #0a0f14;
                --bg-panel: #0f1519;
                --bg-hover: #151c22;
                --border-dim: #1e293b;
                --border-focus: #05ad98;
                --text-primary: #e2e8f0;
                --text-muted: #475569;
                --text-secondary: #94a3b8;
                --accent-bg: #05ad98;
                --accent-text: #0a0f14;
                --positive: #05ad98;
                --negative: #e85d6c;
                --warning: #f5a623;
                --info: #3b82f6;
                --extreme: #8b5cf6;
                --chart-grid: rgba(30, 41, 59, 0.6);
            }

            @media (prefers-color-scheme: light) {
                :root:not([data-theme="dark"]) {
                    --bg-base: #fafbfc;
                    --bg-panel: #ffffff;
                    --bg-hover: #f1f5f9;
                    --border-dim: #d1d5db;
                    --border-focus: #05ad98;
                    --text-primary: #0f172a;
                    --text-muted: #94a3b8;
                    --text-secondary: #64748b;
                    --accent-bg: #05ad98;
                    --accent-text: #ffffff;
                    --positive: #048a7a;
                    --negative: #dc2626;
                    --warning: #d97706;
                    --info: #2563eb;
                    --extreme: #7c3aed;
                    --chart-grid: rgba(209, 213, 219, 0.6);
                }
            }

            [data-theme="light"] {
                --bg-base: #fafbfc;
                --bg-panel: #ffffff;
                --bg-hover: #f1f5f9;
                --border-dim: #d1d5db;
                --border-focus: #05ad98;
                --text-primary: #0f172a;
                --text-muted: #94a3b8;
                --text-secondary: #64748b;
                --accent-bg: #05ad98;
                --accent-text: #ffffff;
                --positive: #048a7a;
                --negative: #dc2626;
                --warning: #d97706;
                --info: #2563eb;
                --extreme: #7c3aed;
                --chart-grid: rgba(209, 213, 219, 0.6);
            }
            [data-theme="dark"] {
                --bg-base: #0a0f14;
                --bg-panel: #0f1519;
                --bg-hover: #151c22;
                --border-dim: #1e293b;
                --border-focus: #05ad98;
                --text-primary: #e2e8f0;
                --text-muted: #475569;
                --text-secondary: #94a3b8;
                --accent-bg: #05ad98;
                --accent-text: #0a0f14;
                --positive: #05ad98;
                --negative: #e85d6c;
                --warning: #f5a623;
                --info: #3b82f6;
                --extreme: #8b5cf6;
                --chart-grid: rgba(30, 41, 59, 0.6);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
                font-size: 13px;
                line-height: 1.5;
                background: var(--bg-base);
                color: var(--text-primary);
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 24px;
            }

            /* --- HEADER --- */
            .header {
                border-bottom: 1px solid var(--border-dim);
                padding-bottom: 16px;
                margin-bottom: 24px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 16px;
            }
            .title {
                font-size: 16px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }
            .subtitle {
                font-size: 11px;
                color: var(--text-muted);
                margin-top: 4px;
            }
            .timestamp {
                font-size: 11px;
                color: var(--text-muted);
            }
            .header-actions {
                display: flex;
                align-items: center;
                gap: 16px;
            }

            /* --- THEME TOGGLE --- */
            .theme-toggle {
                background: transparent;
                border: 1px solid var(--border-dim);
                color: var(--text-primary);
                padding: 4px 12px;
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                transition: all 150ms;
            }
            .theme-toggle:hover {
                background: var(--bg-hover);
                border-color: var(--border-focus);
            }

            /* --- METRICS --- */
            .metrics {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 1px;
                background: var(--border-dim);
                border: 1px solid var(--border-dim);
                margin-bottom: 24px;
                border-radius: 4px;
            }
            .metric {
                background: var(--bg-panel);
                padding: 16px;
            }
            .metric-label {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.15em;
                color: var(--text-muted);
                margin-bottom: 6px;
            }
            .metric-value {
                font-size: 22px;
                font-weight: 500;
                letter-spacing: -0.02em;
            }
            .metric-change {
                font-size: 11px;
                color: var(--text-muted);
                margin-top: 6px;
                padding-top: 6px;
                border-top: 1px solid var(--border-dim);
            }

            /* --- GRID --- */
            .grid-2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .grid-3 {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
            .grid-4 {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }
            .grid-2-1 {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 16px;
            }
            @media (max-width: 768px) {
                .grid-2,
                .grid-3,
                .grid-4,
                .grid-2-1 {
                    grid-template-columns: 1fr;
                }
            }

            /* --- PANELS --- */
            .panel {
                background: var(--bg-panel);
                border: 1px solid var(--border-dim);
                margin-bottom: 16px;
                border-radius: 4px;
            }
            .panel-header {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border-dim);
                font-size: 11px;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .panel-body {
                padding: 16px;
            }

            /* --- TABLES --- */
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                font-size: 10px;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                text-align: left;
                padding: 10px 12px;
                border-bottom: 1px solid var(--border-dim);
                background: var(--bg-panel);
                position: sticky;
                top: 0;
                z-index: 1;
            }
            td {
                padding: 10px 12px;
                border-bottom: 1px solid var(--border-dim);
                font-size: 12px;
            }
            tr:hover {
                background: var(--bg-hover);
            }

            /* --- TEXT --- */
            .text-right {
                text-align: right;
            }
            .text-center {
                text-align: center;
            }
            .text-muted {
                color: var(--text-muted);
            }
            .text-positive {
                color: var(--positive);
            }
            .text-negative {
                color: var(--negative);
            }
            .text-warning {
                color: var(--warning);
            }
            .text-info {
                color: var(--info);
            }
            .text-mono {
                font-family: "IBM Plex Mono", monospace;
            }
            .text-small {
                font-size: 11px;
            }
            .text-tiny {
                font-size: 9px;
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }

            /* --- PILLS --- */
            .pill {
                display: inline-block;
                padding: 2px 8px;
                border: 1px solid var(--border-dim);
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                border-radius: 999px;
            }
            .pill-positive {
                background: var(--positive);
                color: #000;
                border-color: var(--positive);
            }
            .pill-negative {
                background: var(--negative);
                color: #fff;
                border-color: var(--negative);
            }
            .pill-warning {
                background: var(--warning);
                color: #000;
                border-color: var(--warning);
            }
            .pill-info {
                background: var(--info);
                color: #fff;
                border-color: var(--info);
            }
            .pill-accent {
                background: var(--accent-bg);
                color: var(--accent-text);
                border-color: var(--accent-bg);
            }

            /* --- CALLOUTS --- */
            .callout {
                background: var(--bg-hover);
                border-left: 3px solid var(--accent-bg);
                padding: 12px 16px;
                margin-bottom: 12px;
                border-radius: 4px;
            }
            .callout-title {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                margin-bottom: 6px;
            }
            .callout ul {
                margin: 0;
                padding-left: 20px;
            }
            .callout li {
                margin: 4px 0;
                font-size: 12px;
            }
            .callout.positive {
                border-left-color: var(--positive);
            }
            .callout.negative {
                border-left-color: var(--negative);
            }
            .callout.warning {
                border-left-color: var(--warning);
            }

            /* --- SECTION HEADER --- */
            .section-header {
                font-size: 11px;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.15em;
                color: var(--text-muted);
                margin: 24px 0 12px 0;
                padding-bottom: 8px;
                border-bottom: 1px solid var(--border-dim);
            }

            /* --- CHART CONTAINER --- */
            .chart-wrap {
                position: relative;
                width: 100%;
                padding: 8px 0;
            }
            .chart-wrap canvas:not(.spark-canvas) {
                width: 100% !important;
            }

            /* --- PROGRESS BAR --- */
            .bar-container {
                width: 100%;
                height: 8px;
                background: var(--border-dim);
                display: inline-block;
                vertical-align: middle;
                border-radius: 4px;
                overflow: hidden;
            }
            .bar-fill {
                height: 100%;
                border-radius: 4px;
                transition: width 0.3s;
            }
            .bar-fill.positive {
                background: var(--positive);
            }
            .bar-fill.negative {
                background: var(--negative);
            }
            .bar-fill.warning {
                background: var(--warning);
            }
            .bar-fill.info {
                background: var(--info);
            }
            .bar-fill.accent {
                background: var(--accent-bg);
            }

            /* --- STATUS DOT --- */
            .status {
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }
            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--text-muted);
            }
            .status-dot.positive {
                background: var(--positive);
                animation: pulse 2s infinite;
            }
            .status-dot.negative {
                background: var(--negative);
                animation: pulse 2s infinite;
            }
            .status-dot.warning {
                background: var(--warning);
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }

            /* --- FOOTER --- */
            .footer {
                margin-top: 32px;
                padding-top: 16px;
                border-top: 1px solid var(--border-dim);
                color: var(--text-muted);
                font-size: 11px;
                text-align: center;
            }

            /* --- SPARKLINE --- */
            .spark {
                display: flex;
                gap: 2px;
                align-items: end;
                height: 24px;
                padding: 0 4px;
            }
            .spark-bar {
                width: 8px;
                min-height: 3px;
            }
            .spark-bar.up {
                background: var(--positive);
            }
            .spark-bar.down {
                background: var(--negative);
            }
            .spark-bar.flat {
                background: var(--text-muted);
            }
            .spark-bar.now {
                outline: 2px solid var(--accent-bg);
                outline-offset: 1px;
            }

            /* --- SCROLLBAR --- */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: var(--bg-base);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--border-focus);
                border-radius: 3px;
            }

            /* --- PRINT --- */
            @media print {
                body {
                    background: white;
                    color: black;
                    font-size: 11px;
                }
                .theme-toggle,
                .btn {
                    display: none;
                }
                .panel {
                    border-color: #ccc;
                    break-inside: avoid;
                }
                .header {
                    border-bottom-color: #ccc;
                }
                canvas {
                    max-width: 100% !important;
                }
                @page {
                    margin: 0.5in;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">{{BODY}}</div>

        <script>
            // Theme toggle
            function toggleTheme() {
                const html = document.documentElement;
                const current = html.getAttribute("data-theme");
                if (current) {
                    html.setAttribute(
                        "data-theme",
                        current === "dark" ? "light" : "dark",
                    );
                } else {
                    html.setAttribute(
                        "data-theme",
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches
                            ? "light"
                            : "dark",
                    );
                }
                updateToggleIcon();
            }
            function updateToggleIcon() {
                const btn = document.querySelector(".theme-toggle");
                if (!btn) return;
                const html = document.documentElement;
                const isDark =
                    html.getAttribute("data-theme") === "dark" ||
                    (!html.getAttribute("data-theme") &&
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches);
                btn.textContent = isDark ? "☀ LIGHT" : "◐ DARK";
            }
            document.addEventListener("DOMContentLoaded", updateToggleIcon);

            // Chart.js theme-aware defaults
            Chart.defaults.color = getComputedStyle(document.documentElement)
                .getPropertyValue("--text-secondary")
                .trim();
            Chart.defaults.borderColor = getComputedStyle(
                document.documentElement,
            )
                .getPropertyValue("--border-dim")
                .trim();
            Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
            Chart.defaults.font.size = 11;
            Chart.defaults.plugins.tooltip.backgroundColor = getComputedStyle(
                document.documentElement,
            )
                .getPropertyValue("--bg-panel")
                .trim();
            Chart.defaults.plugins.tooltip.titleColor = getComputedStyle(
                document.documentElement,
            )
                .getPropertyValue("--text-primary")
                .trim();
            Chart.defaults.plugins.tooltip.bodyColor = getComputedStyle(
                document.documentElement,
            )
                .getPropertyValue("--text-primary")
                .trim();
            Chart.defaults.plugins.tooltip.borderColor = getComputedStyle(
                document.documentElement,
            )
                .getPropertyValue("--border-focus")
                .trim();
            Chart.defaults.plugins.tooltip.borderWidth = 1;
        </script>
    </body>
</html>
